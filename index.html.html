<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }


  button {
    padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
    border: 1px solid #ccc; background: white; color: #333; white-space: nowrap;
  }
  button:hover { background: #f0f0f0; }
  button.primary { background: #1a73e8; color: white; border-color: #1a73e8; }
  button.primary:hover { background: #1558b0; }

  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: white; border-top: 1px solid #e0e0e0;
    padding: 6px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 12px; color: #555;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 4px; }
  .dot.green { background: #34a853; }
  .dot.yellow { background: #fbbc04; }
  .dot.red { background: #ea4335; }
  #countdown { font-weight: 600; color: #1a73e8; }

  #map { position: fixed; top: 0; bottom: 32px; left: 0; right: 0; }

  .leaflet-popup-content {
    font-size: 13px; line-height: 1.5;
    min-width: 200px; max-width: 300px;
  }
  .popup-title {
    font-size: 14px; font-weight: 600; color: #111;
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid #eee;
  }
  .popup-address {
    font-size: 12px; color: #555; margin-bottom: 8px;
  }
  .popup-row {
    display: flex; justify-content: space-between; gap: 8px;
    padding: 3px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px;
  }
  .popup-row:last-child { border-bottom: none; }
  .popup-label { color: #888; flex-shrink: 0; }
  .popup-value { color: #222; text-align: right; font-weight: 500; }
  .stage-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; background: #e8f0fe; color: #1a73e8;
  }
  .popup-notes {
    font-size: 12px; color: #444; margin-top: 8px; padding-top: 6px;
    border-top: 1px solid #eee; line-height: 1.5;
  }

  #setup-panel {
    position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .panel-card {
    background: white; border-radius: 12px; padding: 28px 32px;
    max-width: 500px; width: 100%;
  }
  .panel-card h2 { font-size: 18px; margin-bottom: 8px; }
  .panel-card p { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 16px; }
  .panel-card ol { font-size: 13px; color: #444; line-height: 2.2; padding-left: 20px; margin-bottom: 20px; }
  .panel-card ol code { background: #f5f5f5; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  .panel-card label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; }
  .panel-card input[type=text] {
    width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px;
    font-size: 13px; margin-bottom: 4px;
  }
  .hint { font-size: 11px; color: #999; margin-bottom: 16px; }
  #error-msg { color: #ea4335; font-size: 13px; margin-top: 10px; display: none; }

  #search-bar {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 1000; width: 360px; max-width: 90vw;
  }
  #search-input {
    width: 100%; padding: 10px 16px; border-radius: 24px;
    border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    font-size: 14px; outline: none; background: white; color: #111;
  }
  #search-input:focus { box-shadow: 0 2px 16px rgba(0,0,0,0.3); }
  #search-results {
    background: white; border-radius: 12px; margin-top: 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15); overflow: hidden;
    display: none; max-height: 300px; overflow-y: auto;
  }
  .search-result {
    padding: 10px 16px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px;
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: #f5f5f5; }
  .search-result .result-icon { font-size: 16px; flex-shrink: 0; }
  .search-result .result-name { font-weight: 500; color: #111; }
  .search-result .result-sub { font-size: 12px; color: #888; margin-top: 1px; }
  #filter-bar {
    position: fixed; top: 52px; left: 12px; z-index: 999;
    background: white; border: 1px solid #ddd; border-radius: 8px;
    padding: 8px 12px; font-size: 12px; display: none; flex-direction: column; gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  #filter-bar label { font-weight: 500; color: #333; }
  #stage-filter { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>





<div id="search-bar">
  <input type="text" id="search-input" placeholder="Search properties or cities..." autocomplete="off" />
  <div id="search-results"></div>
</div>

<div id="filter-bar">
  <label>Filter by Type</label>
  <select id="type-filter"><option value="">All types</option></select>
</div>

<div id="map"></div>

<div id="legend" style="position:fixed;bottom:40px;right:12px;z-index:999;background:white;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
  <div style="font-weight:600;margin-bottom:6px;color:#333">Property Type</div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
    <svg width="16" height="22" viewBox="0 0 28 38"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 24 14 24S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="#e8392b" stroke="#a3190f" stroke-width="1.5"/><circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/></svg>
    <span style="color:#444">Hwy</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <svg width="16" height="22" viewBox="0 0 28 38"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 24 14 24S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="#2d7d2d" stroke="#1a4f1a" stroke-width="1.5"/><circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/></svg>
    <span style="color:#444">Land</span>
  </div>
</div>


  <div id="legend" style="position:fixed;bottom:40px;right:12px;z-index:999;background:white;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <div style="font-weight:600;margin-bottom:6px;color:#111;">Property Type</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <svg width="14" height="20" viewBox="0 0 28 40"><path d="M14 0 C6.268 0 0 6.268 0 14 C0 24.5 14 40 14 40 C14 40 28 24.5 28 14 C28 6.268 21.732 0 14 0 Z" fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5"/><circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/></svg>
      <span style="color:#444;">Hwy</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <svg width="14" height="20" viewBox="0 0 28 40"><path d="M14 0 C6.268 0 0 6.268 0 14 C0 24.5 14 40 14 40 C14 40 28 24.5 28 14 C28 6.268 21.732 0 14 0 Z" fill="#22C55E" stroke="#16A34A" stroke-width="1.5"/><circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/></svg>
      <span style="color:#444;">Land</span>
    </div>
  </div>


<div id="status-bar">
  <span><span class="dot" id="status-dot"></span><span id="status-text">Loading...</span></span>
  <span>|</span>
  <span id="pin-count">0 properties</span>
  <span>|</span>
  <span>Refresh in <span id="countdown">5:00</span></span>
  <span>|</span>
  <span id="last-updated"></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const REFRESH_MS = 5 * 60 * 1000;
const COL_LATLNG  = 'Latitude / Longitude';
const COL_ADDRESS = 'Property Address Full';
const COL_CITY    = 'Property City';
const COL_STATE   = 'Property State';
const COL_NAME    = 'Contact Name';
const COL_OWNER   = 'Owner Type';
const COL_PRICE   = 'Price';
const COL_SF      = '$/SF';
const COL_ACRES   = 'Acres';
const COL_STAGE   = 'Stage';
const COL_NOTES   = 'Property Notes';
const COL_TYPE    = 'Property Type';
const COL_ZIP     = 'Zip';

let map, markersLayer;
let allRows = [];
let refreshTimer = null, countdownTimer = null, countdownVal = 300;
let csvUrl = '';

function initMap() {
  map = L.map('map').setView([37.5, -96], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

function parseCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseRow(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseRow(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function parseRow(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

function parseLatLng(val) {
  if (!val) return null;
  const parts = val.split(',').map(s => parseFloat(s.trim()));
  if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
    return { lat: parts[0], lng: parts[1] };
  }
  return null;
}

function fmt(val) { return val && val.trim() ? val.trim() : null; }


function cleanAddress(addr) {
  if (!addr) return addr;

  // Strip leading/trailing underscores, dashes, spaces
  addr = addr.replace(/^[_\-\s]+/, '').replace(/[_\-\s]+$/, '');

  // Fix missing comma between city and state: "Tulsa OK" -> "Tulsa, OK"
  const states = 'AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY';
  addr = addr.replace(new RegExp('([a-zA-Z])\\s+(' + states + ')\\s*(\\d{5})?', 'g'), (m, pre, st, zip) => {
    return pre + ', ' + st.toUpperCase() + (zip ? ' ' + zip : '');
  });

  // Title case each word except known abbreviations and directionals
  const abbrevs = {
    'street': 'St', 'st': 'St', 'avenue': 'Ave', 'ave': 'Ave',
    'boulevard': 'Blvd', 'blvd': 'Blvd', 'highway': 'Hwy', 'hwy': 'Hwy',
    'road': 'Rd', 'rd': 'Rd', 'drive': 'Dr', 'dr': 'Dr',
    'lane': 'Ln', 'ln': 'Ln', 'court': 'Ct', 'ct': 'Ct',
    'circle': 'Cir', 'cir': 'Cir', 'place': 'Pl', 'pl': 'Pl',
    'trail': 'Trl', 'trl': 'Trl', 'parkway': 'Pkwy', 'pkwy': 'Pkwy',
    'way': 'Way', 'loop': 'Loop', 'pass': 'Pass',
    'n': 'N', 's': 'S', 'e': 'E', 'w': 'W',
    'ne': 'NE', 'nw': 'NW', 'se': 'SE', 'sw': 'SW',
  };

  // Split on commas to preserve structure
  const parts = addr.split(',').map(part => {
    return part.trim().split(' ').map(word => {
      const lower = word.toLowerCase().replace(/[^a-z]/g, '');
      if (abbrevs[lower]) return abbrevs[lower];
      // Keep state abbreviations uppercase
      if (/^[A-Z]{2}$/.test(word)) return word;
      // Keep ZIP codes as-is
      if (/^\d{5}(-\d{4})?$/.test(word)) return word;
      // Title case everything else
      return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
    }).join(' ');
  });

  return parts.join(', ');
}

function buildPopup(row) {
  const name    = fmt(row[COL_NAME]);
  const address = fmt(row[COL_ADDRESS]);
  const acres   = fmt(row[COL_ACRES]);
  const notes   = fmt(row[COL_NOTES]);

  let html = '';
  if (name)    html += `<div class="popup-title">${name}</div>`;
  if (address) html += `<div class="popup-address">${address}</div>`;
  const propType = fmt(row[COL_TYPE]);
  if (propType) html += `<div class="popup-row"><span class="popup-label">Type</span><span class="popup-value">${propType}</span></div>`;
  if (acres)   html += `<div class="popup-row"><span class="popup-label">Size</span><span class="popup-value">${acres} Acres</span></div>`;
  if (notes)   html += `<div class="popup-notes">${notes}</div>`;
  return html || '<em>No data</em>';
}


function makePin(color, borderColor) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">
    <path d="M14 0 C6.268 0 0 6.268 0 14 C0 24.5 14 40 14 40 C14 40 28 24.5 28 14 C28 6.268 21.732 0 14 0 Z" fill="${color}" stroke="${borderColor}" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [28, 40],
    iconAnchor: [14, 40],
    popupAnchor: [0, -40]
  });
}

const PIN_ICONS = {
  'hwy':     makePin('#9CA3AF', '#6B7280'),
  'land':    makePin('#22C55E', '#16A34A'),
  'default': makePin('#3B82F6', '#2563EB')
};

function getIcon(row) {
  const type = (row[COL_TYPE] || '').toLowerCase().trim();
  if (type.includes('hwy') || type.includes('highway')) return PIN_ICONS.hwy;
  if (type.includes('land')) return PIN_ICONS.land;
  return PIN_ICONS.default;
}

function renderMarkers(rows) {
  markersLayer.clearLayers();
  const bounds = [];
  let ok = 0, skip = 0;

  rows.forEach(row => {
    const coords = parseLatLng(row[COL_LATLNG]);
    if (!coords) { skip++; return; }
    ok++;
    bounds.push([coords.lat, coords.lng]);
    const marker = L.marker([coords.lat, coords.lng], { icon: getIcon(row) });
    marker.bindPopup(buildPopup(row), { maxWidth: 320 });
    markersLayer.addLayer(marker);
  });

  if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
  document.getElementById('pin-count').textContent = ok + ' propert' + (ok === 1 ? 'y' : 'ies') + (skip ? ` (${skip} missing coords)` : '');
}

function populateTypeFilter(rows) {
  const types = [...new Set(rows.map(r => (r[COL_TYPE]||'').trim()).filter(Boolean))].sort();
  const sel = document.getElementById('type-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All types</option>';
  types.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    if (t === cur) o.selected = true;
    sel.appendChild(o);
  });
  document.getElementById('filter-bar').style.display = types.length ? 'flex' : 'none';
}

function applyFilter() {
  const type = document.getElementById('type-filter').value;
  const filtered = type ? allRows.filter(r => (r[COL_TYPE]||'').trim() === type) : allRows;
  renderMarkers(filtered);
}

function setStatus(type, text) {
  document.getElementById('status-dot').className = 'dot ' + type;
  document.getElementById('status-text').textContent = text;
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownVal = 300;
  countdownTimer = setInterval(() => {
    countdownVal = Math.max(0, countdownVal - 1);
    const m = Math.floor(countdownVal / 60);
    const s = countdownVal % 60;
    document.getElementById('countdown').textContent = m + ':' + String(s).padStart(2,'0');
  }, 1000);
}

async function loadAndRender() {
  if (!csvUrl) return;
  setStatus('yellow', 'Fetching sheet...');
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!Array.isArray(json) || json.length === 0) { setStatus('red', 'No data found in sheet'); return; }
    allRows = json.map(row => {
      const out = {};
      Object.entries(row).forEach(([k,v]) => out[k.trim()] = String(v).trim());
      // Clean up address field, append ZIP from Zip column if missing
      if (out[COL_ADDRESS]) {
        let addr = out[COL_ADDRESS];
        const hasZip = /\d{5}/.test(addr);
        if (!hasZip && out[COL_ZIP] && /\d{5}/.test(out[COL_ZIP])) {
          addr = addr.replace(/,?\s*$/, '') + ' ' + out[COL_ZIP].trim();
        }
        out[COL_ADDRESS] = cleanAddress(addr);
      }
      return out;
    });
    if (allRows.length === 0) { setStatus('red', 'No data found in sheet'); return; }
    // Debug: log column headers to console
    console.log('Columns found:', Object.keys(allRows[0]));
    console.log('First row sample:', allRows[0]);
    populateTypeFilter(allRows);
    applyFilter();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    setStatus('green', 'Live');
    startCountdown();
    if (refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = setTimeout(loadAndRender, REFRESH_MS);
  } catch(e) {
    setStatus('red', 'Could not load sheet — check the URL');
    document.getElementById('error-msg').style.display = 'block';
  }
}

document.getElementById('type-filter').addEventListener('change', applyFilter);





initMap();

// Search functionality
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  searchResults.innerHTML = '';
  if (q.length < 2) { searchResults.style.display = 'none'; return; }

  const matches = [];

  // Search through pins
  allRows.forEach((row, idx) => {
    const name    = (row[COL_NAME] || '').toLowerCase();
    const address = (row[COL_ADDRESS] || '').toLowerCase();
    const city    = (row[COL_CITY] || '').toLowerCase();
    const state   = (row[COL_STATE] || '').toLowerCase();
    if (name.includes(q) || address.includes(q) || city.includes(q) || state.includes(q)) {
      const coords = parseLatLng(row[COL_LATLNG]);
      if (coords) matches.push({ type: 'pin', row, coords, idx });
    }
  });

  // Dedupe cities for "fly to city" option
  const citiesAdded = new Set();
  allRows.forEach(row => {
    const city  = (row[COL_CITY] || '').trim();
    const state = (row[COL_STATE] || '').trim();
    if (city.toLowerCase().includes(q) && !citiesAdded.has(city)) {
      citiesAdded.add(city);
      matches.push({ type: 'city', city, state });
    }
  });

  if (matches.length === 0) {
    // No local matches — offer Nominatim city search
    const cityItem = document.createElement('div');
    cityItem.className = 'search-result';
    cityItem.innerHTML = `<span class="result-icon">🔍</span><div><div class="result-name">Search "${searchInput.value}" on map</div><div class="result-sub">Fly to location</div></div>`;
    cityItem.addEventListener('click', () => flyToQuery(searchInput.value));
    searchResults.appendChild(cityItem);
    searchResults.style.display = 'block';
    return;
  }

  matches.slice(0, 8).forEach(m => {
    const item = document.createElement('div');
    item.className = 'search-result';
    if (m.type === 'pin') {
      const name = (m.row[COL_NAME] || m.row[COL_ADDRESS] || 'Property').trim();
      const sub  = (m.row[COL_ADDRESS] || '').trim();
      item.innerHTML = `<span class="result-icon">📍</span><div><div class="result-name">${name}</div><div class="result-sub">${sub}</div></div>`;
      item.addEventListener('click', () => {
        map.setView([m.coords.lat, m.coords.lng], 15);
        // Find and open the marker
        markersLayer.eachLayer(layer => {
          if (Math.abs(layer.getLatLng().lat - m.coords.lat) < 0.0001 &&
              Math.abs(layer.getLatLng().lng - m.coords.lng) < 0.0001) {
            layer.openPopup();
          }
        });
        searchResults.style.display = 'none';
        searchInput.value = name;
      });
    } else {
      item.innerHTML = `<span class="result-icon">🏙️</span><div><div class="result-name">${m.city}</div><div class="result-sub">${m.state} — fly to city</div></div>`;
      item.addEventListener('click', () => flyToQuery(m.city + ', ' + m.state));
    }
    searchResults.appendChild(item);
  });

  searchResults.style.display = 'block';
});

async function flyToQuery(query) {
  searchResults.style.display = 'none';
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
    const data = await res.json();
    if (data && data.length > 0) {
      map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 11);
      searchInput.value = query;
    }
  } catch(e) {}
}

document.addEventListener('click', e => {
  if (!document.getElementById('search-bar').contains(e.target)) {
    searchResults.style.display = 'none';
  }
});

csvUrl = 'https://script.google.com/macros/s/AKfycbxPU1Lbb6C-2bKUxhSzuGRT7c54zR5bO-Mqn3eSaSDO5V5oeh2TS_omrzIbtxJjwkWVRQ/exec';
loadAndRender();
</script>
</body>
</html>
